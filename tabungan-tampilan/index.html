<!DOCTYPE html>
<html>
  <!--test deploy-->
  <!--update paksa-->
<head>
  <title>Tabungan App</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  height: 100vh;
  background: url("./WhatsApp Image 2026-04-28 at 20.17.52.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* LAYOUT UTAMA */
.layout {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  color: white;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.sidebar button:hover {
  background: #1abc9c;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

/* CARD CONTAINER (TRANSPARAN GLASS) */
.main > div {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 15px;
  color: white;
}

/* DASHBOARD CARDS */
.cards {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.card {
  flex: 1;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  font-size: 18px;
  color: white;
}

.masuk { background: #27ae60; }
.keluar { background: #e67e22; }
.saldo { background: #2980b9; }

/* FORM */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  background: rgba(255,255,255,0.9);
  border-radius: 10px;
  overflow: hidden;
  color: black;
}

th {
  background: #2c3e50;
  color: white;
}

td, th {
  padding: 10px;
  text-align: center;
}
  </style>
</head>

<body>

<div id="app" class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Tabungan</h2>
    <button @click="page='dashboard'">Dashboard</button>
    <button @click="page='user'">User</button>
    <button @click="page='transaksi'">Transaksi</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- DASHBOARD -->
    <div v-if="page==='dashboard'">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card masuk">Masuk<br>Rp {{ totalMasuk }}</div>
        <div class="card keluar">Keluar<br>Rp {{ totalKeluar }}</div>
        <div class="card saldo">Saldo<br>Rp {{ saldo }}</div>
      </div>
    </div>

    <!-- USER -->
    <div v-if="page==='user'">
      <h1>User</h1>

      <input v-model="namaBaru" placeholder="Nama user">
      <button @click="tambahUser">Tambah</button>

      <ul>
        <li v-for="u in users">
          <input v-model="u.nama">
          <button @click="updateUser(u)">💾</button>
          <button @click="hapusUser(u.id)">🗑️</button>
        </li>
      </ul>
    </div>

    <!-- TRANSAKSI -->
    <div v-if="page==='transaksi'">
      <h1>Transaksi</h1>

      <select v-model="user_id">
        <option v-for="u in users" :value="u.id">
          {{ u.nama }}
        </option>
      </select>

      <input v-model="jumlah" placeholder="Jumlah">
      <input v-model="keterangan" placeholder="Keterangan">

      <button @click="tabung">Tabung</button>
      <button @click="tarik">Tarik</button>

      <table>
  <tr>
    <th>Tipe</th>
    <th>Jumlah</th>
    <th>Keterangan</th>
    <th>Tanggal</th>
    <th>Aksi</th>
  </tr>

  <tr v-for="r in riwayat">
    <td>{{ r.tipe }}</td>

    <td v-if="editId !== r.id">{{ r.jumlah }}</td>
    <td v-else>
      <input v-model="editJumlah">
    </td>

    <td v-if="editId !== r.id">{{ r.keterangan }}</td>
    <td v-else>
      <input v-model="editKeterangan">
    </td>

    <td>{{ formatTanggal(r.created_at) }}</td>

    <td>
      <button @click="hapus(r.id)">🗑️</button>

      <button v-if="editId !== r.id" @click="editTransaksi(r)">✏️</button>
      <button v-else @click="simpanEdit(r)">💾</button>
    </td>
  </tr>
</table>
    </div>

  </div>
</div>

</div>

<script>

const API = "https://tabungan-api.fairuzim934.workers.dev"

Vue.createApp({
  data() {
    return {
      user_id: "",
      jumlah: "",
      saldo: 0,
      riwayat: [],
      users: [],
      namaBaru: "",
      editId: null,
      editJumlah: "",
      editKeterangan: "",
      page: "dashboard",
      keterangan: "",
      totalMasuk: 0,
      totalKeluar: 0,
      keterangan: ""
    }
  },
  methods: {
    async tabung() {
  const res = await fetch(API + "/tabung", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: this.user_id,
      jumlah: this.jumlah,
      keterangan: this.keterangan
    })
  })

  const data = await res.json()

  if (!res.ok) {
    alert("Gagal: " + data.error)
  } else {
    alert("Berhasil menabung")
    this.cekSaldo()
    this.getRiwayat()
  }
},
    async tarik() {
  const res = await fetch(API + "/tarik", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: this.user_id,
      jumlah: this.jumlah,
      keterangan: this.keterangan
    })
  })

  const data = await res.json()

  if (!res.ok) {
    alert("Gagal: " + data.error)
  } else {
    alert("Berhasil tarik")
    this.cekSaldo()
    this.getRiwayat()
  }
},
    async cekSaldo() {
      const res = await fetch(API + "/saldo/" + this.user_id)
      const data = await res.json()
      this.saldo = data.saldo
    },
    async getRiwayat() {
      const res = await fetch(API + "/riwayat/" + this.user_id)
      this.riwayat = await res.json()
      this.totalMasuk = 0
this.totalKeluar = 0

this.riwayat.forEach(r => {
  if (r.tipe === "masuk") {
    this.totalMasuk += Number(r.jumlah)
  } else {
    this.totalKeluar += Number(r.jumlah)
  }
})

      this.renderChart() //update grafik
    },
    async hapus(id) {
  try {
    const res = await fetch(API + "/transaksi/" + id, {
      method: "DELETE"
    })

    const data = await res.json()

    if (!res.ok) {
      alert("Gagal hapus: " + data.error)
    } else {
      alert("Berhasil dihapus")
      this.getRiwayat()
      this.cekSaldo()
    }

  } catch (err) {
    alert("ERROR: " + err.message)
  }
},

renderChart() {
  const ctx = document.getElementById('chartSaldo')

  if (!ctx) return

  if (this.chart) {
    this.chart.destroy()
  }

  let masuk = 0
  let keluar = 0

  this.riwayat.forEach(r => {
    if (r.tipe === "masuk") masuk += Number(r.jumlah)
    else keluar += Number(r.jumlah)
  })

  this.chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Masuk', 'Keluar'],
      datasets: [{
        label: 'Total',
        data: [masuk, keluar],
        backgroundColor: ['green', 'orange']
      }]
    }
  })
},

async cekTambahUser() {
  if (this.user_id === "tambah") {
    const nama = prompt("Masukkan nama user baru:")

    if (!nama) {
      this.user_id = ""
      return
    }

    await fetch(API + "/users", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ nama })
    })

    await this.getUsers()

    this.user_id = this.users[0]?.id
  }
},

async getUsers() {
  try {
    const res = await fetch(API + "/users")
    const data = await res.json()
    console.log("DATA USERS:", data)
    this.users = data
  } catch (err) {
    console.error("ERROR:", err)
  }
},

async tambahUser() {
  if (!this.namaBaru) return alert("Nama kosong")

  await fetch(API + "/users", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nama: this.namaBaru })
  })

  this.namaBaru = ""
  this.getUsers()
},

async updateUser(u) {
  await fetch(API + "/users/" + u.id, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nama: u.nama })
  })

  alert("User diupdate")
},

async hapusUser(id) {
  if (!confirm("Yakin hapus user?")) return

  await fetch(API + "/users/" + id, {
    method: "DELETE"
  })

  this.getUsers()
},

formatTanggal(tanggal) {
  const d = new Date(tanggal)
  return d.toLocaleString("id-ID", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  })
},

editTransaksi(item) {
  this.editId = item.id
  this.editJumlah = item.jumlah
  this.editKeterangan = item.keterangan
},

async simpanEdit(item) {
  await fetch(API + "/transaksi/" + item.id, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      jumlah: this.editJumlah,
      keterangan: this.editKeterangan
    })
  })

  this.editId = null
  this.getRiwayat()
  this.cekSaldo()
}

},
mounted() {
  console.log("APP JALAN")
  this.getUsers()
},

watch: {
  user_id(val) {
    if (val && val !== "tambah") {
      this.cekSaldo()
      this.getRiwayat()
    }
  }
},

}).mount("#app")
</script>

</body>
</html>
